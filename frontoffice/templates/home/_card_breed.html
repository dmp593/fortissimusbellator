{% load i18n %}

<article class="ui-card ui-card-interactive overflow-hidden">
    {% if breed.cover %}
    <img src="{{ breed.cover.url }}" alt="{% blocktrans with breed_name=breed.name %}{{ breed_name }} from a breeder in Portugal{% endblocktrans %}" class="w-full h-64 object-cover rounded-t-lg" loading="lazy">
    {% endif %}
    <div class="p-6">
        <h3 class="font-serif text-2xl font-bold text-stone-900 dark:text-white">
            {{ breed }}
        </h3>
        <p class="font-sans text-stone-700 dark:text-stone-300 mt-4 leading-relaxed">
            {{ breed.description }}
        </p>
        <a href="{% url 'breeding:buy_a_dog' %}?breed={{ breed.pk }}"
           class="ui-button ui-button-primary mt-6"
           aria-label="{% blocktrans with breed_name=breed.name %}Learn more about the breed {{ breed_name }}{% endblocktrans %}">
            {% translate "Learn More" %}
        </a>
    </div>
</article>
