{% extends 'base.html' %}
{% load static %}
{% load i18n %}

{% block content %}
<div class="ui-page-wide">
    <div class="ui-card mx-auto max-w-lg p-8 text-center">
        <h2 class="ui-section-title mb-4">
            {% translate "Resend Activation Email" %}
        </h2>
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="email" class="ui-label">
                    {% translate "Email" %}
                </label>
                <input type="email" name="email" id="email" 
                       class="ui-input"
                       placeholder="{% translate 'Enter your email' %}" required>
            </div>
            <button type="submit" class="ui-button ui-button-primary w-full">
                {% translate "Resend Email" %}
            </button>
        </form>
        {% if error %}
        <p class="ui-error-text">{{ error }}</p>
        {% endif %}
    </div>
</div>
{% endblock %}
