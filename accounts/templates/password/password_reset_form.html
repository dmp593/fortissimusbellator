{% extends 'base.html' %}
{% load static %}
{% load i18n %}

{% block content %}
<div class="ui-page-wide">
    <div class="ui-card mx-auto max-w-md p-8">
        <h2 class="ui-section-title mb-8 text-center">
            {% translate "Reset Password" %}
        </h2>
        <form method="post" action="{% url 'password_reset' %}" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="id_email" class="ui-label">
                    {% translate "Email" %}
                </label>
                <input type="email" name="email" id="id_email" 
                       class="ui-input"
                       placeholder="{% translate 'Enter your email' %}">
            </div>
            <button type="submit" class="ui-button ui-button-primary w-full">
                {% translate "Reset Password" %}
            </button>
        </form>
        <div class="mt-6 text-center">
            <p class="text-sm text-stone-700 dark:text-stone-300">
                <a href="{% url 'login' %}" class="text-yellow-800 dark:text-yellow-400 hover:underline">{% translate "Back to login" %}</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
