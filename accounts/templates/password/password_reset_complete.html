{% extends 'base.html' %}
{% load static %}
{% load i18n %}

{% block content %}
<div class="ui-page-wide">
    <div class="ui-card mx-auto max-w-md p-8">
        <h2 class="ui-section-title mb-8 text-center">
            {% translate "Password Reset Complete" %}
        </h2>
        <p class="text-sm text-stone-700 dark:text-stone-300 text-center">
            {% translate "Your password has been set. You may now log in." %}
        </p>
        <div class="mt-6 text-center">
            <p class="text-sm text-stone-700 dark:text-stone-300">
                <a href="{% url 'login' %}" class="text-yellow-800 dark:text-yellow-400 hover:underline">{% translate "Log in" %}</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
